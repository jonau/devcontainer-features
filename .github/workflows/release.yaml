name: Publish Dev Container Features

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository_owner != ''
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & Publish Features
        uses: devcontainers/action@v1
        with:
          publish-features: true
          base-path-to-features: ./src
          generate-docs: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open PR for generated docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config pull.rebase false
          branch="automation/docs-update-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          git add src/**/README.md
          if git commit -m "Automated docs update [skip ci]"; then
            git push origin "$branch"
            gh pr create --title "Automated docs update" --body "Regenerated feature docs via release workflow."
          else
            echo "No documentation changes detected; skipping PR creation."
          fi
